<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="60%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0a1e"/>
  <!-- Magnifying glass lens -->
  <circle cx="26" cy="26" r="18" fill="none" stroke="url(#glass)" stroke-width="4"/>
  <!-- Lens glass fill -->
  <circle cx="26" cy="26" r="16" fill="url(#glass)" opacity="0.15"/>
  <!-- Exclamation mark inside lens (alert signal) -->
  <line x1="26" y1="14" x2="26" y2="29" stroke="#a78bfa" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="26" cy="36" r="2.5" fill="#a78bfa"/>
  <!-- Handle -->
  <line x1="38" y1="38" x2="54" y2="54" stroke="url(#handle)" stroke-width="5" stroke-linecap="round"/>
  <!-- Glow ring -->
  <circle cx="26" cy="26" r="19.5" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
</svg>
