server {
    listen 80 default_server;
    server_name _;

    # ── Personal homepage (root) ──
    root /opt/github-pages;
    index index.html;
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Static documents ──
    location /documents/ {
        alias /opt/github-pages/documents/;
        add_header Cache-Control "no-cache";
    }

    # ── Miho-spot SPA (dashboard) ──
    location /app/ {
        alias /opt/miho-spot/miho-spot/frontend/dist/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /app/index.html;
    }

    # ── Advisor Review Platform SPA ──
    location /advisor/ {
        alias /opt/advisor-review/frontend/dist/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /advisor/index.html;
    }

    # ── Advisor Review API (before generic /api/) ──
    location /advisor/api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── SSE stream for debate ──
    location /api/debate/stream/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # ── Backend API ──
    location /api/ {
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
